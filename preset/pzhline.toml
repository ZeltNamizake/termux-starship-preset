format = """
[ ◀](white)\
$directory\
$git_branch\
$time
$character
"""

right_format = """
$python\
$c\
$cpp\
${custom.cs}\
${custom.sh}\
$ruby\
$nodejs\
$php\
$golang\
"""

[directory]
style = "fg:black bg:white"
format = "[ $path ]($style)"
truncation_length = 1
truncation_symbol = "⋮/"

[character]
disabled = false
success_symbol = '[➤](bold fg:white)'
error_symbol = '[➤](dimmed fg:red)'

[time]
disabled = false
time_format = "%R"
style = "bg:8 fg:white"
format = '[ 󰥔 $time ]($style)'

[git_branch]
format = '[  $branch ](bg:202 fg:white bold)'

#Symbol extension & folder
[golang]
format = "[󰟓](white)"
detect_extensions = ["go"]

[python]
format = "[󰌠 ](white)"
detect_extensions = ['py']

[c]
format = "[ ](white)"
detect_extensions = ["c"]

[cpp]
disabled = false
format = "[ ](white)"
detect_extensions = ["cpp"]

[custom.cs]
format = "[󰌛 ](white)"
detect_extensions = ["cs"]

[ruby]
format = "[ ](white)"
detect_extensions = ["rb"]

[php]
format = "[ ](white)"
detect_extensions = ["php"]

[custom.sh]
format = "[ ](white)"
detect_extensions = ["sh"]

[nodejs]
format = '[󰎙 ](white)'
detect_folders = ['node_modules']
